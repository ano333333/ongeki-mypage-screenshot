<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ongeki MyPage Screenshot Bookmarklet</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
        }
        .bookmarklet {
            display: inline-block;
            padding: 10px 20px;
            background: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px 0;
        }
        .bookmarklet:hover {
            background: #0052a3;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .instruction {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid #0066cc;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Ongeki MyPage Screenshot Bookmarklet</h1>

    <div class="instruction">
        <h2>使い方</h2>
        <ol>
            <li>下のリンクをブックマークバーにドラッグ&ドロップしてください</li>
            <li>オンゲキのマイページで、作成したブックマークレットをクリックしてください</li>
            <li>スクリーンショットが自動的に撮影されます</li>
        </ol>
    </div>

    <a href="javascript:(function(){document.body.appendChild(document.createElement('script')).src='./main.js';})();" class="bookmarklet">
        📸 Ongeki Screenshot
    </a>

    <h2>説明</h2>
    <p>このブックマークレットは、オンゲキのマイページでスクリーンショットを撮影するためのツールです。</p>

    <h2>ソースコード</h2>
    <p>ソースコードは<a href="https://github.com/ano3/ongeki-mypage-screenshot">GitHub</a>で公開されています。</p>
</body>
</html>
