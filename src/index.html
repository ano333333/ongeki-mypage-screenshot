<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ongeki MyPage Screenshot Bookmarklet</title>
    <style>
      body {
              font-family:
                -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial,
                sans-serif;
              max-width: 800px;
              margin: 0 auto;
              padding: 20px;
              line-height: 1.6;
            }
            h1 {
              color: #333;
            }
            .bookmarklet {
              display: inline-block;
              padding: 10px 20px;
              background: #0066cc;
              color: white;
              text-decoration: none;
              border-radius: 5px;
              margin: 20px 0;
              border: none;
              font-size: 16px;
              cursor: pointer;
            }
            .bookmarklet:hover {
              background: #0052a3;
            }
            .bookmarklet.copied {
              background: #28a745;
            }
            code {
              background: #f4f4f4;
              padding: 2px 6px;
              border-radius: 3px;
            }
            .instruction {
              background: #f9f9f9;
              padding: 15px;
              border-left: 4px solid #0066cc;
              margin: 20px 0;
            }
    </style>
  </head>
  <body>
    <h1>Ongeki MyPage Screenshot Bookmarklet</h1>

    <div class="instruction">
      <h2>使い方</h2>
      <ol>
        <li>
          下のボタンをクリックして、ブックマークレットのコードをコピーしてください
        </li>
        <li>
          ブラウザでブックマークを新規作成し、URLにコピーしたコードを貼り付けてください
        </li>
        <li>
          オンゲキのマイページで、作成したブックマークレットをクリックしてください
        </li>
        <li>スクリーンショットが自動的に撮影されます</li>
      </ol>
    </div>

    <button type="button" class="bookmarklet" id="copyButton">
      📸 ブックマークレットをコピー
    </button>

    <script>
      const bookmarkletCode = "javascript:MAIN_JS";
            const button = document.getElementById("copyButton");

            button.addEventListener("click", async () => {
              try {
                await navigator.clipboard.writeText(bookmarkletCode);
                const originalText = button.textContent;
                button.textContent = "✅ コピーしました！";
                button.classList.add("copied");

                setTimeout(() => {
                  button.textContent = originalText;
                  button.classList.remove("copied");
                }, 2000);
              } catch (err) {
                alert("コピーに失敗しました: " + err);
              }
            });
    </script>

    <h2>説明</h2>
    <p>
      このブックマークレットは、オンゲキのマイページでスクリーンショットを撮影するためのツールです。
    </p>

    <h2>ソースコード</h2>
    <p>
      ソースコードは<a href="https://github.com/ano3/ongeki-mypage-screenshot"
        >GitHub</a
      >で公開されています。
    </p>
  </body>
</html>
